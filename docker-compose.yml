services:
  db:
    image: pgvector/pgvector:pg16
    container_name: docsage-db
    environment:
      POSTGRES_USER: docsage
      POSTGRES_PASSWORD: docsage
      POSTGRES_DB: docsage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsage -d docsage"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  pgdata:
