[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "smoke: opt-in tests that hit real external APIs (skipped by default)",
]
addopts = "-m 'not smoke'"
testpaths = ["tests"]
