[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
# E501: line-too-long handled by formatter
# B008: FastAPI requires Depends/File/Form in argument defaults
ignore = ["E501", "B008"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "smoke: opt-in tests that hit real external APIs (skipped by default)",
]
addopts = "-m 'not smoke'"
testpaths = ["tests"]
